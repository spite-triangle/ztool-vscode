- generic [ref=e2]: "[ { \"sha\": \"09adf12d772033a375ac9ab542ba83910fe122a0\", \"filename\": \"plugins/vscode-history/.gitignore\", \"status\": \"added\", \"additions\": 3, \"deletions\": 0, \"changes\": 3, \"blob_url\": \"https://github.com/ZToolsCenter/ZTools-plugins/blob/81c7432700e449d038d2f77079c8b03174403861/plugins%2Fvscode-history%2F.gitignore\", \"raw_url\": \"https://github.com/ZToolsCenter/ZTools-plugins/raw/81c7432700e449d038d2f77079c8b03174403861/plugins%2Fvscode-history%2F.gitignore\", \"contents_url\": \"https://api.github.com/repos/ZToolsCenter/ZTools-plugins/contents/plugins%2Fvscode-history%2F.gitignore?ref=81c7432700e449d038d2f77079c8b03174403861\", \"patch\": \"@@ -0,0 +1,3 @@\\n+example\\n+dist\\n+node_modules\" }, { \"sha\": \"ad750c4d12b61e44f53473b928b99374c9fd96dc\", \"filename\": \"plugins/vscode-history/CLAUDE.md\", \"status\": \"added\", \"additions\": 107, \"deletions\": 0, \"changes\": 107, \"blob_url\": \"https://github.com/ZToolsCenter/ZTools-plugins/blob/81c7432700e449d038d2f77079c8b03174403861/plugins%2Fvscode-history%2FCLAUDE.md\", \"raw_url\": \"https://github.com/ZToolsCenter/ZTools-plugins/raw/81c7432700e449d038d2f77079c8b03174403861/plugins%2Fvscode-history%2FCLAUDE.md\", \"contents_url\": \"https://api.github.com/repos/ZToolsCenter/ZTools-plugins/contents/plugins%2Fvscode-history%2FCLAUDE.md?ref=81c7432700e449d038d2f77079c8b03174403861\", \"patch\": \"@@ -0,0 +1,107 @@\\n+# CLAUDE.md\\n+\\n+This file provides guidance to Claude Code (claude.ai/code) when working with code in this repository.\\n+\\n+## Project Overview\\n+\\n+This repository contains two ZTools plugins (not VS Code extensions):\\n+\\n+1. **Root project** (`.`) — A Vue 3 + Vite + TypeScript ZTools plugin for searching and opening VSCode/Cursor history projects\\n+2. **Example project** (`example/vscode/`) — Original \\\"vscode next\\\" ZTools plugin (vanilla JS, utools-based, source for migration)\\n+\\n+The root project is the migrated version. It uses Vue 3 + Vite + TypeScript and runs as a ZTools plugin.\\n+\\n+## ZTools API References\\n+\\n+- [`plugin.json` 配置](https://ztoolscenter.github.io/ZTools-doc/plugin-json.html)\\n+- [`preload.js` 配置](https://ztoolscenter.github.io/ZTools-doc/preload-js.html)\\n+- [Node.js 能力](https://ztoolscenter.github.io/ZTools-doc/node-js.html)\\n+- [插件可用 API](https://ztoolscenter.github.io/ZTools-doc/plugin-api.html)\\n+- [ZTools 官方文档](https://github.com/ztool-center/ztools)\\n+\\n+## Key Commands\\n+\\n+### Root project\\n+\\n+```bash\\n+npm install # Install dependencies\\n+npm run dev # Start Vite dev server at localhost:5173\\n+npm run build # Build production to dist/ (runs vue-tsc then vite build)\\n+```\\n+\\n+### example/vscode/\\n+\\n+```bash\\n+npm install # Install dependencies\\n+npm run dev # Start Vite dev server\\n+npm run build # Build: esbuild backend + Vite frontend + copy assets to dist/\\n+```\\n+\\n+## Architecture\\n+\\n+### Root Project (Vue 3 + Vite + TypeScript)\\n+\\n+- **Entry**: `src/main.ts` → `App.vue` → route-based components\\n+- **Routing**: `App.vue` routes to components based on `action.code` from `window.ztools.onPluginEnter()`\\n+- **ZTools manifest**: `public/plugin.json` — features defined with `code`, `cmds`, `explain`, `icon`\\n+- **Node.js bridge**: `public/preload/services.js` — preload script that exposes Node.js APIs via `window.services`\\n+- **SQL.js**: npm package for SQLite operations in preload (WASM-based)\\n+- **TypeScript**: `src/env.d.ts` declares `window.services` and ZTools types\\n+\\n+### Component Structure\\n+\\n+| Component | Path | Purpose |\\n+|-----------|------|---------|\\n+| VSCodeSearch | `src/VSCodeSearch/index.vue` | Search and open VSCode history projects |\\n+| VSCodeIDE | `src/VSCodeIDE/index.vue` | Manage IDE configurations (add/remove/edit) |\\n+\\n+### Core Modules\\n+\\n+| Module | Path | Purpose |\\n+|--------|------|---------|\\n+| Types | `src/types.ts` | Type definitions (IDEConfig, SearchItem, etc.) |\\n+| Config | `src/config.ts` | IDE config management (get/save/delete) |\\n+\\n+### Preload Services (`public/preload/services.js`)\\n+\\n+| Method | Purpose |\\n+|--------|---------|\\n+| `getVSCodeHistory(dbPath)` | Read VSCode history from state.vscdb |\\n+| `deleteVSCodeHistory(dbPath, path)` | Delete single history entry |\\n+| `deleteMultipleVSCodeHistory(dbPath, paths)` | Batch delete history entries |\\n+| `shellExec(cmd, options)` | Execute shell command |\\n+| `getAllDbStorageKeys()` | Get all dbStorage keys |\\n+| `getAllIDEConfigs()` | Get all IDE configurations |\\n+| `saveIDEConfig(config)` | Save IDE configuration |\\n+| `deleteIDEConfig(code)` | Delete IDE configuration |\\n+\\n+## Key Files Reference\\n+\\n+| File | Purpose |\\n+|------|---------|\\n+| `public/plugin.json` | ZTools plugin manifest (features, preload, logo) |\\n+| `public/preload/services.js` | Node.js bridge — SQL.js, shell exec, DB ops |\\n+| `src/main.ts` | Vue app entry |\\n+| `src/App.vue` | Root component with route logic |\\n+| `src/types.ts` | TypeScript type definitions |\\n+| `src/config.ts` | IDE config management |\\n+| `src/env.d.ts` | TypeScript declarations for window/services |\\n+| `vite.config.js` | Vite config with Vue plugin |\\n+| `tsconfig.json` | TypeScript config with node + ztools types |\\n+\\n+## Adding a New Feature\\n+\\n+1. Create component in `src/<FeatureName>/index.vue`\\n+2. Add route in `src/App.vue` template and script\\n+3. Add feature entry to `public/plugin.json` `features` array with `code`, `cmds`, `explain`, `icon`\\n+\\n+## Adding Node.js Capability to Preload\\n+\\n+Edit `public/preload/services.js` to add new functions, then update `src/env.d.ts` with type declarations.\\n+\\n+## Current Features (plugin.json)\\n+\\n+| Code | Commands | Description |\\n+|------|----------|-------------|\\n+| `vscode` | vscode, 搜索历史项目, vscode-history | Search VSCode history projects |\\n+| `vscode-ide` | vscode-ide, 管理 IDE, 添加 IDE | Manage IDE configurations |\" }, { \"sha\": \"9f7a61bfe5c57408d748b104f162f38358cd47ac\", \"filename\": \"plugins/vscode-history/README.md\", \"status\": \"added\", \"additions\": 136, \"deletions\": 0, \"changes\": 136, \"blob_url\": \"https://github.com/ZToolsCenter/ZTools-plugins/blob/81c7432700e449d038d2f77079c8b03174403861/plugins%2Fvscode-history%2FREADME.md\", \"raw_url\": \"https://github.com/ZToolsCenter/ZTools-plugins/raw/81c7432700e449d038d2f77079c8b03174403861/plugins%2Fvscode-history%2FREADME.md\", \"contents_url\": \"https://api.github.com/repos/ZToolsCenter/ZTools-plugins/contents/plugins%2Fvscode-history%2FREADME.md?ref=81c7432700e449d038d2f77079c8b03174403861\", \"patch\": \"@@ -0,0 +1,136 @@\\n+# vscode-history\\n+\\n+> 快速搜索 VSCode / Cursor 历史项目并打开\\n+\\n+这是一个使用 **Vue 3 + Vite + TypeScript** 构建的 ZTools 插件，用于搜索和打开本地 VSCode / Cursor 的最近打开项目历史记录。\\n+\\n+参考项目\\n+- [vscode next](https://github.com/mohuishou/utools)\\n+\\n+## ✨ 功能特性\\n+\\n+### 🔍 搜索历史项目\\n+\\n+- 输入关键词搜索本地 VSCode / Cursor 历史项目\\n+- 支持多关键词模糊匹配\\n+- 无搜索词时默认展示最近 20 条项目记录\\n+- 一键打开项目（支持普通文件夹和工作区文件）\\n+- 每条记录提供「打开」和「删除」操作按钮\\n+- 删除单条历史记录或批量删除\\n+\\n+### ⚙️ 管理 IDE 配置\\n+\\n+- 添加、编辑、删除自定义 IDE 配置\\n+- 支持的 IDE：VSCode、VSCode Insider、Cursor\\n+- 快速创建常用 IDE 配置（一键初始化）\\n+- 配置项包括：启动命令、终端命令、数据库路径、超时时间\\n+- 自动检测并填充数据库路径（基于 IDE 类型）\\n+- 对话框式编辑，操作清晰安全\\n+\\n+### 🛠 技术特性\\n+\\n+- SQLite 数据库读写（通过 SQL.js WASM）\\n+- 自动验证项目路径有效性（存在且为目录）\\n+- Shell 命令执行（支持指定终端）\\n+- 防抖搜索，提升输入体验\\n+- Vue 3 响应式错误处理\\n+\\n+## 📁 项目结构\\n+\\n+```\\n+.\\n+├── public/\\n+│ ├── logo.png # 插件图标\\n+│ ├── plugin.json # ZTools 插件清单（功能入口、preload 配置）\\n+│ └── preload/\\n+│ ├── services.js # Node.js 能力扩展（SQL.js、Shell 执行、DB 操作）\\n+├── src/\\n+│ ├── main.ts # Vue 应用入口\\n+│ ├── App.vue # 根组件（Tab 切换、路由分发）\\n+│ ├── main.css # 全局 CSS 变量与基础样式\\n+│ ├── env.d.ts # TypeScript 类型声明（window.services、ZTools）\\n+│ ├── types.ts # 类型定义（IDEConfig、SearchItem 等）\\n+│ ├── config.ts # IDE 配置管理（get/save/delete）\\n+│ ├── VSCodeMain/ # 主框架（Tab 栏）\\n+│ │ └── index.vue\\n+│ ├── VSCodeSearch/ # 搜索历史项目组件\\n+│ │ └── index.vue\\n+│ └── VSCodeIDE/ # IDE 配置管理组件\\n+│ └── index.vue\\n+├── index.html # HTML 模板\\n+├── vite.config.js # Vite 配置\\n+├── tsconfig.json # TypeScript 配置\\n+├── package.json # 项目依赖\\n+└── README.md # 项目文档\\n+```\\n+\\n+## 🚀 快速开始\\n+\\n+### 安装依赖\\n+\\n+```bash\\n+npm install\\n+```\\n+\\n+### 开发模式\\n+\\n+```bash\\n+npm run dev\\n+```\\n+\\n+开发服务器将在 `http://localhost:5173` 启动，ZTools 会自动加载开发版本。\\n+\\n+### 构建生产版本\\n+\\n+```bash\\n+npm run build\\n+```\\n+\\n+构建产物将输出到 `dist/` 目录，将 `dist/` 中的文件复制到 ZTools 插件目录即可使用。\\n+\\n+## 🚀 使用方式\\n+\\n+### 搜索历史项目\\n+\\n+1. 在 ZTools 中输入指令 `搜索历史项目` / `vscode` 触发插件\\n+2. 选择 IDE 配置（支持多 IDE 切换）\\n+3. 输入关键词搜索项目，或直接查看最近 20 条记录\\n+4. 点击「打开」在 VSCode / Cursor 中打开项目，或点击「删除」移除历史记录\\n+\\n+### 管理 IDE 配置\\n+\\n+1. 在 ZTools 中输入指令 `管理 IDE` 进入 IDE 管理页面\\n+2. 使用快速创建按钮一键添加 VSCode / VSCode Insider / Cursor\\n+3. 点击「自定义添加」支持任意自定义 IDE\\n+4. 点击「编辑」修改终端命令、数据库路径等配置\\n+\\n+## 📚 相关资源\\n+\\n+- [ZTools 官方文档](https://github.com/ztool-center/ztools)\\n+- [ZTools API 文档](https://github.com/ztool-center/ztools-api-types)\\n+\\n+## ❓ 常见问题\\n+\\n+### Q: 搜索不到项目记录？\\n+\\n+A: 确认 VSCode / Cursor 已配置对应的数据库路径（state.vscdb）。在\\\"IDE 管理\\\"中添加或编辑 IDE 配置，数据库路径会自动填充。\\n+\\n+### Q: 如何添加新的 IDE（如 Cursor、WebStorm）？\\n+\\n+A: 进入\\\"IDE 管理\\\"页面，点击\\\"自定义添加\\\"，填写 IDE 标识和启动命令即可。数据库路径会自动检测。\\n+\\n+### Q: 删除历史记录后如何恢复？\\n+\\n+A: 当前版本不支持恢复已删除的记录，重新在 VSCode / Cursor 中打开一次项目会自动重新录入。\\n+\\n+### Q: 如何调试插件？\\n+\\n+A: 使用 `npm run dev` 启动开发服务器，在 ZTools 插件界面中打开开发者工具进行调试。\\n+\\n+## 📄 开源协议\\n+\\n+MIT License\\n+\\n+---\\n+\\n+**祝你开发愉快！** 🎉\" }, { \"sha\": \"eaa17316cdb1eacfaf3474a6653761feb3e03405\", \"filename\": \"plugins/vscode-history/index.html\", \"status\": \"added\", \"additions\": 11, \"deletions\": 0, \"changes\": 11, \"blob_url\": \"https://github.com/ZToolsCenter/ZTools-plugins/blob/81c7432700e449d038d2f77079c8b03174403861/plugins%2Fvscode-history%2Findex.html\", \"raw_url\": \"https://github.com/ZToolsCenter/ZTools-plugins/raw/81c7432700e449d038d2f77079c8b03174403861/plugins%2Fvscode-history%2Findex.html\", \"contents_url\": \"https://api.github.com/repos/ZToolsCenter/ZTools-plugins/contents/plugins%2Fvscode-history%2Findex.html?ref=81c7432700e449d038d2f77079c8b03174403861\", \"patch\": \"@@ -0,0 +1,11 @@\\n+<!doctype html>\\n+<html lang=\\\"en\\\">\\n+ <head>\\n+ <meta charset=\\\"UTF-8\\\" />\\n+ <meta name=\\\"viewport\\\" content=\\\"width=device-width, initial-scale=1.0\\\" />\\n+ </head>\\n+ <body>\\n+ <div id=\\\"app\\\"></div>\\n+ <script type=\\\"module\\\" src=\\\"/src/main.ts\\\"></script>\\n+ </body>\\n+</html>\" }, { \"sha\": \"64dd711955aa3273d9f1661a158a8b30df00b2b6\", \"filename\": \"plugins/vscode-history/package-lock.json\", \"status\": \"added\", \"additions\": 1552, \"deletions\": 0, \"changes\": 1552, \"blob_url\": \"https://github.com/ZToolsCenter/ZTools-plugins/blob/81c7432700e449d038d2f77079c8b03174403861/plugins%2Fvscode-history%2Fpackage-lock.json\", \"raw_url\": \"https://github.com/ZToolsCenter/ZTools-plugins/raw/81c7432700e449d038d2f77079c8b03174403861/plugins%2Fvscode-history%2Fpackage-lock.json\", \"contents_url\": \"https://api.github.com/repos/ZToolsCenter/ZTools-plugins/contents/plugins%2Fvscode-history%2Fpackage-lock.json?ref=81c7432700e449d038d2f77079c8b03174403861\", \"patch\": \"@@ -0,0 +1,1552 @@\\n+{\\n+ \\\"name\\\": \\\"vscode\\\",\\n+ \\\"version\\\": \\\"1.0.0\\\",\\n+ \\\"lockfileVersion\\\": 3,\\n+ \\\"requires\\\": true,\\n+ \\\"packages\\\": {\\n+ \\\"\\\": {\\n+ \\\"name\\\": \\\"vscode\\\",\\n+ \\\"version\\\": \\\"1.0.0\\\",\\n+ \\\"dependencies\\\": {\\n+ \\\"sql.js\\\": \\\"^1.14.1\\\",\\n+ \\\"vue\\\": \\\"^3.5.13\\\"\\n+ },\\n+ \\\"devDependencies\\\": {\\n+ \\\"@types/node\\\": \\\"^25.6.0\\\",\\n+ \\\"@types/sql.js\\\": \\\"^1.4.11\\\",\\n+ \\\"@vitejs/plugin-vue\\\": \\\"^5.2.1\\\",\\n+ \\\"@ztools-center/ztools-api-types\\\": \\\"^1.0.1\\\",\\n+ \\\"typescript\\\": \\\"^5.3.0\\\",\\n+ \\\"vite\\\": \\\"^6.0.11\\\",\\n+ \\\"vue-tsc\\\": \\\"^2.0.0\\\"\\n+ }\\n+ },\\n+ \\\"no